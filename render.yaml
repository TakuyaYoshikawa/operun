services:
  - type: web
    name: operun-api
    env: python
    region: singapore  # 日本に最も近いリージョン
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Render ダッシュボードで手動設定
      - key: SECRET_KEY
        sync: false  # Render ダッシュボードで手動設定
      - key: ANTHROPIC_API_KEY
        sync: false  # Render ダッシュボードで手動設定
      - key: ALLOWED_ORIGINS
        sync: false  # 例: https://operun.vercel.app
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
